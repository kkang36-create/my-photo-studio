<!DOCTYPE html>
<html lang="ko">
<head>
 
    <meta charset="UTF-8">
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6261416107166337"
     crossorigin="anonymous"></script>
 <meta name="naver-site-verification" content="c987763f2c8a46a916c124518c33fdb5825d5c2b" />

    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가벼운 사진관 | 블로거를 위한 이미지 최적화 도구</title>
    <style>
        /* 디자인 부분 */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; text-align: center; padding: 0; margin: 0; background-color: #f5f5f7; color: #1d1d1f; line-height: 1.6; }
        
        /* 상단 메뉴 바 (모든 페이지 공통) */
        nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #d2d2d7; padding: 15px 0; }
        nav div { max-width: 650px; margin: 0 auto; display: flex; justify-content: space-around; font-size: 14px; font-weight: 500; }
        nav a { text-decoration: none; color: #1d1d1f; transition: color 0.2s; }
        nav a:hover { color: #0071e3; }

        .container { max-width: 650px; margin: 40px auto; background: white; padding: 40px 30px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
        h2 { font-size: 32px; font-weight: 800; margin-bottom: 10px; letter-spacing: -0.8px; }
        .safety-badge { display: inline-block; background: #e8f4fd; color: #0071e3; padding: 8px 16px; border-radius: 50px; font-size: 13px; font-weight: 700; margin-bottom: 20px; }

        .custom-file-upload { border: 2px dashed #d2d2d7; border-radius: 20px; padding: 50px 20px; display: block; cursor: pointer; background: #fafafa; transition: all 0.3s ease; margin-bottom: 25px; }
        .custom-file-upload:hover { border-color: #0071e3; background: #f5faff; transform: translateY(-2px); }
        .upload-icon { font-size: 48px; margin-bottom: 10px; display: block; }
        input[type="file"] { display: none; }

        .slider-container { margin: 30px 0; text-align: left; padding: 25px; background: #fbfbfd; border-radius: 16px; border: 1px solid #f0f0f2; }
        input[type="range"] { width: 100%; height: 6px; border-radius: 5px; background: #d2d2d7; outline: none; -webkit-appearance: none; margin-top: 15px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; background: #0071e3; border-radius: 50%; cursor: pointer; border: 3px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }

        #downloadAllBtn { display: none; width: 100%; background: #0071e3; color: white; border: none; border-radius: 14px; padding: 18px; font-size: 17px; font-weight: 700; cursor: pointer; margin-bottom: 25px; transition: background 0.2s; }
        #downloadAllBtn:hover { background: #005bb5; }

        .results-list { margin-top: 25px; text-align: left; }
        .result-item { display: flex; align-items: center; justify-content: space-between; background: #fff; border: 1px solid #e5e5e7; padding: 15px 20px; border-radius: 14px; margin-bottom: 12px; }
        .item-name { font-size: 14px; font-weight: 600; color: #1d1d1f; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
        .item-size { font-size: 13px; color: #86868b; }
        .item-size span { color: #ff3b30; font-weight: 700; }
        .download-btn { background: #f5f5f7; color: #0071e3; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <nav>
        <div>
            <a href="index.html" style="font-weight: 800; color: #0071e3;">홈(도구)</a>
            <a href="guide.html">SEO 가이드</a>
            <a href="about.html">제작 동기</a>
            <a href="policy.html">개인정보방침</a>
        </div>
    </nav>

    <div class="container">
        <span class="safety-badge">
            🔒 100% 온-디바이스 보안 공정
        </span>
        <h2>가벼운 사진관</h2>
        <p style="color: #424245; font-weight: 600; margin-bottom: 5px;">
        블로거를 위한 사진 용량 줄이기와 위치정보 삭제를 한번에!
    </p>
    <p style="color: #86868b; font-size: 14px; margin-bottom: 30px;">
        블로그 로딩은 번개처럼, 개인정보는 철저하게!
    </p>
        <label for="upload" class="custom-file-upload">
            <span class="upload-icon">📂</span>
            <span id="fileNameDisplay">이미지 파일들을 선택하거나 여기로 끌어다 놓으세요</span>
        </label>
        <input type="file" id="upload" accept="image/*" multiple>

        <div class="slider-container">
            <label style="font-weight: 700; font-size: 15px; color: #1d1d1f;">압축 강도 설정: <span id="qualityValue" style="color:#0071e3;">70%</span></label>
            <input type="range" id="quality" min="0.1" max="1.0" step="0.1" value="0.7">
            <p style="font-size: 12px; color: #86868b; margin-top: 10px;">※ 숫자가 낮을수록 용량은 작아지지만 화질이 저하될 수 있습니다.</p>
        </div>

        <button id="downloadAllBtn" onclick="downloadAll()">📦 최적화 완료된 사진 일괄 다운로드</button>
        <div class="results-list" id="resultsList"></div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        // 실제 기능을 담당하는 스크립트 로직 (전체)
        const upload = document.getElementById('upload');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const qualityInput = document.getElementById('quality');
        const qualityValue = document.getElementById('qualityValue');
        const resultsList = document.getElementById('resultsList');
        const downloadAllBtn = document.getElementById('downloadAllBtn');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let currentFiles = [];
        let compressedBlobs = [];

        // 용량 단위 변환 함수
        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // 슬라이더 숫자 변경 표시
        qualityInput.addEventListener('input', () => {
            qualityValue.innerText = Math.round(qualityInput.value * 100) + '%';
        });

        // 슬라이더를 멈추면 재압축 실행
        qualityInput.addEventListener('change', () => {
            if (currentFiles.length > 0) reProcessAll();
        });

        // 파일 선택 시 실행
        upload.addEventListener('change', (e) => {
            const files = e.target.files;
            if (files.length === 0) return;
            currentFiles = Array.from(files);
            reProcessAll();
        });

        // 모든 파일 압축 처리 함수
        function reProcessAll() {
            resultsList.innerHTML = '';
            compressedBlobs = [];
            downloadAllBtn.style.display = 'none';
            fileNameDisplay.innerText = `${currentFiles.length}장의 사진을 안전하게 처리 중...`;

            currentFiles.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        // 캔버스에 그려서 메타데이터(GPS 등) 자동 삭제
                        canvas.width = img.width;
                        canvas.height = img.height;
                        ctx.drawImage(img, 0, 0);

                        canvas.toBlob((blob) => {
                            const blobUrl = URL.createObjectURL(blob);
                            compressedBlobs.push({ url: blobUrl, name: file.name });

                            const saved = ((file.size - blob.size) / file.size * 100).toFixed(1);
                            const item = document.createElement('div');
                            item.className = 'result-item';
                            item.innerHTML = `
                                <div class="result-info">
                                    <div class="item-name">${file.name}</div>
                                    <div class="item-size">${formatBytes(file.size)} ➡️ ${formatBytes(blob.size)} (<span>▼${saved}%</span>)</div>
                                </div>
                                <button class="download-btn" onclick="downloadImage('${blobUrl}', '${file.name}')">다운로드</button>
                            `;
                            resultsList.appendChild(item);

                            // 모든 파일 완료 시 전체 다운로드 버튼 표시
                            if (compressedBlobs.length === currentFiles.length) {
                                downloadAllBtn.style.display = 'block';
                                fileNameDisplay.innerText = "모든 보안 공정이 완료되었습니다! 🎉";
                            }
                        }, 'image/jpeg', parseFloat(qualityInput.value));
                    };
                };
                reader.readAsDataURL(file);
            });
        }

        // 개별 다운로드
        window.downloadImage = (url, name) => {
            const a = document.createElement('a');
            a.download = 'clean_' + name.replace(/\.[^/.]+$/, "") + ".jpg";
            a.href = url;
            a.click();
        };

        // 전체 다운로드 (순차적 실행)
        window.downloadAll = () => {
            compressedBlobs.forEach((b, i) => {
                setTimeout(() => downloadImage(b.url, b.name), i * 250);
            });
        };
    </script>
</body>
</html>
